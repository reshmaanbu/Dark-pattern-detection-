<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Dark Pattern Detector{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a href="{{ url_for('index') }}" class="nav-logo">
      <span class="nav-logo-icon">⚠</span>
      <span>DarkPatternDetector</span>
    </a>
    <button class="nav-toggle" onclick="toggleNav()" aria-label="Toggle menu">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Home</a></li>
      <li><a href="{{ url_for('analyzer') }}" class="nav-link {% if request.endpoint in ['analyzer','analyze'] %}active{% endif %}">Analyze</a></li>
      <li><a href="{{ url_for('compare') }}" class="nav-link {% if request.endpoint in ['compare','compare_urls'] %}active{% endif %}">Compare</a></li>
      <li><a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a></li>
      <li><a href="{{ url_for('history') }}" class="nav-link {% if request.endpoint == 'history' %}active{% endif %}">History</a></li>
      <li><a href="{{ url_for('learn') }}" class="nav-link {% if request.endpoint == 'learn' %}active{% endif %}">Learn</a></li>
      <li><a href="{{ url_for('about') }}" class="nav-link {% if request.endpoint == 'about' %}active{% endif %}">About</a></li>
    </ul>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Dark Pattern Detector &copy; 2024 &mdash; Built for a more honest web.</p>
  </footer>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
